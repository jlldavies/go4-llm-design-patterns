name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Validate SUMMARY.md
        run: python3 build/validate.py

      - name: Prepare source files
        run: python3 build/prepare.py

      - name: Build mdBook
        run: mdbook build build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
